<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SessionShare Dashboard</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
  <!-- Loading Indicator -->
  <div id="loading" class="overlay">
    <div class="loader-container">
      <div class="glow-ring"></div>
      <div class="pulse-logo">SS</div>
      <span class="loading-text">Loading SessionShare...</span>
    </div>
  </div>

  <!-- Auth Screen -->
  <div id="auth-container" class="container hidden">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="logo-text">SessionShare</h1>
        <p class="auth-subtitle">Unlock Premium Experiences Together</p>
      </div>
      <form id="login-form">
        <div class="input-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" required placeholder="name@domain.com">
        </div>
        <div class="input-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required placeholder="••••••••">
        </div>
        <div id="auth-error" class="error-msg hidden"></div>
        <button type="submit" class="btn btn-primary" id="login-btn">
          <span>Sign In</span>
          <div class="btn-glow"></div>
        </button>
      </form>
    </div>
  </div>

  <!-- Dashboard Container -->
  <div id="app-container" class="container hidden">
    <!-- Header -->
    <header class="app-header">
      <div class="header-left">
        <div class="logo-container">
          <svg class="logo-key" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="8" cy="12" r="5"/>
            <line x1="12" y1="12" x2="22" y2="12"/>
            <line x1="17" y1="12" x2="17" y2="16"/>
            <line x1="20" y1="12" x2="20" y2="16"/>
          </svg>
          <span class="logo-text-inline">sessionshare</span>
        </div>
      </div>
      <div class="header-right-search">
        <div class="search-box">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="appSearch" placeholder="Apple TV+">
        </div>
      </div>
    </header>

    <!-- Categories Section -->
    <div class="categories-accordion">
      <div id="categoriesHeader" class="categories-header">
        <span class="categories-title">CATEGORIES</span>
        <svg class="accordion-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div id="categoryFiltersContainer" class="filter-scroll">
        <!-- Capsule filters injected here -->
      </div>
    </div>

    <!-- Navigation Bar (for subfolders) -->
    <div id="folderNav" class="folder-navigation hidden">
      <button id="folderBackButton" class="btn btn-secondary">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="back-arrow"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        <span>Back</span>
      </button>
      <span id="currentFolderName" class="folder-name-title">Folder Name</span>
    </div>

    <!-- Main Listing Area -->
    <main class="main-content">
      <!-- Favorites Area -->
      <section id="favoritesSection" class="dashboard-section hidden">
        <h2 class="section-title">Pinned</h2>
        <div id="pinnedServicesContainer" class="services-grid">
          <!-- Favorite cards injected here -->
        </div>
      </section>

      <!-- Services List -->
      <section class="dashboard-section">
        <div id="servicesContainer" class="services-grid">
          <!-- Folders & Services cards injected here -->
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <div class="footer-left">
        <button id="logoutButton" class="footer-icon-btn" title="Sign Out">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-dasharray="none" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
        <button id="refreshButton" class="footer-icon-btn" title="Sync Services">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
        </button>
        <button id="logsButton" class="footer-icon-btn" title="Activity Logs">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </button>
        <button id="lockButton" class="footer-icon-btn" title="Security lock">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </button>
        <button id="megaphoneButton" class="footer-icon-btn" title="Announcements">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>
        </button>
      </div>
      <div class="footer-right">
        <span class="footer-version">version 2.3 — SessionShare © 2023-2026</span>
        <button id="theme-toggle" class="footer-icon-btn" title="Toggle Theme">
          <svg class="theme-sun hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="theme-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </footer>
  </div>

  <!-- Custom Right-Click Context Menu -->
  <div id="customContextMenu" class="context-menu hidden">
    <button id="pinContextAction" class="context-item">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="context-icon"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="12" x2="12" y2="22"/><path d="M12 6c-3.31 0-6 2.69-6 6h12c0-3.31-2.69-6-6-6z"/></svg>
      <span id="pinActionText">Pin Card</span>
    </button>
  </div>

  <!-- Dynamic UMD/CDN script injection helpers -->
  <script src="../lib/vendor/supabase.min.js"></script>
  <script type="module" src="popup.js"></script>
</body>
</html>
